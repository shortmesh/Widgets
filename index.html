<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script src="widget.js"></script>

    <button
      onclick="
        ShortMeshWidget.open({
          identifier: '+237650393369',
          endpoints: {
            platforms: 'http://localhost:4000/api/v1/platforms',
            sendOtp: 'http://localhost:4000/api/v1/otp/generate',
            verifyOtp: 'http://localhost:4000/api/v1/otp/verify',
          },
          onSuccess: (data) => {
            console.log('Verified!', data);
          },
          onError: (err) => {
            console.error('Error:', err);
          },
        })
      "
    >
      Verify with ShortMesh
    </button>
  </body>
</html>
